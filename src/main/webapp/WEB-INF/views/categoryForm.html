<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; border-bottom: 2px solid #5b8dd9; padding-bottom: 10px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 300px; border: 1px solid #ddd; }
        .error { color: red; font-size: 0.9em; }
        .btn { padding: 8px 16px; background-color: #5b8dd9; color: white; border: none; cursor: pointer; }
        footer { margin-top: 40px; background-color: #f5f5f5; padding: 15px; text-align: center; }
    </style>
</head>
<body>
<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div class="form-group">
        <label>카테고리 이름</label>
        <input type="text" th:field="*{name}" placeholder="카테고리 이름 입력"/>
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></p>
    </div>
    <button type="submit" class="btn">등록</button>
    <a th:href="@{/categories}">목록으로</a>
</form>

<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + ' | 학번: 2371305 | 성명: 김가은'}"></p>
</footer>
</body>
</html>
