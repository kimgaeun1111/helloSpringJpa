<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; border-bottom: 2px solid #5b8dd9; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #5b8dd9; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .btn { padding: 8px 16px; background-color: #5b8dd9; color: white; border: none; cursor: pointer; text-decoration: none; }
        .btn-danger { background-color: #e74c3c; }
        .message { color: green; margin-bottom: 10px; }
        .error { color: red; margin-bottom: 10px; }
        footer { margin-top: 40px; background-color: #f5f5f5; padding: 15px; text-align: center; }
    </style>
</head>
<body>
<h1>카테고리 목록</h1>

<p th:if="${successMessage}" class="message" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" class="error" th:text="${errorMessage}"></p>

<a th:href="@{/categories/create}" class="btn">+ 새 카테고리 등록</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="category : ${categories}">
        <td th:text="${category.id}"></td>
        <td th:text="${category.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post">
                <button type="submit" class="btn btn-danger">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + ' | 학번: 2371305 | 성명: 김가은'}"></p>
</footer>
</body>
</html>
